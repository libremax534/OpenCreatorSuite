<div class="login-container">
  <div class="login-card glass-card fade-in">
    <!-- Logo -->
    <div class="logo-section">
      <h1 class="logo-text">OpenCreator</h1>
      <p class="logo-subtitle">Studio</p>
    </div>

    <!-- Formulaire -->
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input
          id="username"
          type="text"
          class="input-glass"
          [(ngModel)]="username"
          name="username"
          placeholder="Entrez votre nom d'utilisateur"
          [disabled]="isLoading()"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          id="password"
          type="password"
          class="input-glass"
          [(ngModel)]="password"
          name="password"
          placeholder="Entrez votre mot de passe"
          [disabled]="isLoading()"
          required
        />
      </div>

      <!-- Message d'erreur -->
      @if (errorMessage()) {
        <div class="error-message">
          {{ errorMessage() }}
        </div>
      }

      <!-- Bouton Submit -->
      <button
        type="submit"
        class="btn-primary login-button"
        [disabled]="isLoading()"
      >
        @if (isLoading()) {
          <span class="loading-spinner"></span>
        } @else {
          Se connecter
        }
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p class="version-text">Version 1.0.0</p>
    </div>
  </div>
</div>
